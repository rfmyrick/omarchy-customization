# Simple packages to install via pacman (preferred)
# These packages require no special configuration
# Format: Array of package names

PACMAN_PACKAGES=(
    # System monitoring and utilities
    cmatrix           # Matrix rain effect for terminal
    powertop          # Power consumption monitoring
    htop              # Interactive process viewer
    btop              # Modern system resource monitor
    
    # File and data utilities
    rsync             # File synchronization tool
    tree              # Directory tree viewer
    unzip             # Archive extraction
    p7zip             # 7-zip support
    wget              # File downloader
    
    # Modern CLI replacements
    fzf               # Fuzzy finder
    ripgrep           # Fast grep alternative
    fd                # Fast find alternative
    bat               # Cat with syntax highlighting
    glow              # Markdown filw formatter
    eza               # Modern ls replacement
    zoxide            # Smart cd command
    stow              # Symlink farm manager
    yazi              # tui for file management
    
    # Data processing
    jq                # JSON processor
    yq                # YAML processor
    
    # Development tools
    git-delta         # Syntax-highlighting pager for git
    shellcheck        # Shell script static analysis
    shfmt             # Shell script formatter
    
    # Documentation and help
    tldr              # Simplified man pages
    httpie            # User-friendly HTTP client
    
    # Media tools
    yt-dlp            # YouTube video downloader
)

# Packages that require AUR (last resort)
# These will be installed with yay and logged as AUR usage
AUR_PACKAGES=(
    # Removed: llmfit - Build errors, reinstall manually when needed
    hyprmon-bin       # TUI or configuring monitors
)
