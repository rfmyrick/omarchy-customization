# =============================================================================
# CUSTOM OVERRIDES
# These settings override Omarchy defaults
# This file is sourced by ~/.config/hypr/hyprland.conf
# =============================================================================

# =============================================================================
# MUSIC: Cider instead of Spotify
# =============================================================================
# First, unbind the existing Spotify binding
unbind = SUPER SHIFT, M

# Bind to Cider instead
bindd = SUPER SHIFT, M, Music (Cider), exec, omarchy-launch-or-focus cider

# =============================================================================
# AI: t3.chat instead of ChatGPT
# =============================================================================
# First, unbind the existing ChatGPT binding
unbind = SUPER SHIFT, A

# Bind to t3.chat instead
bindd = SUPER SHIFT, A, AI (t3.chat), exec, omarchy-launch-webapp "https://www.t3.chat"

# =============================================================================
# Window Rules
# =============================================================================
# Source window rules from separate file
source = ~/.config/hypr/window-rules.conf

# =============================================================================
# Additional Customizations
# Add your own customizations below
# =============================================================================

# Example: Custom window rule
# windowrule = workspace 5, class:^(cider)$

# Example: Floating window
# windowrule = float, class:^(pavucontrol)$

# Example: Custom keybinding
# bindd = SUPER SHIFT, X, Custom App, exec, my-custom-app
