# =============================================================================
# WINDOW RULES
# Configure window behavior and workspace assignments
# =============================================================================

# =============================================================================
# Workspace Assignments
# Uncomment and modify to assign apps to specific workspaces
# =============================================================================

# Example: Always open Cider on workspace 10
# windowrule = workspace 10, class:^(cider)$

# Example: Always open browser on workspace 2
# windowrule = workspace 2, class:^(brave-browser|chromium|firefox)$

# =============================================================================
# Floating Windows
# Configure which windows should float instead of tile
# =============================================================================

# Example: Make pavucontrol (audio settings) float
# windowrule = float, class:^(pavucontrol)$

# Example: Make file picker dialogs float
# windowrule = float, title:^(Open File|Save File)$

# =============================================================================
# Window Size and Position
# Set default size and position for floating windows
# =============================================================================

# Example: Center and size a floating window
# windowrule = size 800 600, class:^(my-floating-app)$
# windowrule = center, class:^(my-floating-app)$

# =============================================================================
# Other Rules
# =============================================================================

# Example: Disable animations for a specific app
# windowrule = noanim, class:^(some-app)$

# Example: Make window opaque (no transparency)
# windowrule = opaque, class:^(video-player)$

# Example: Pin window to all workspaces
# windowrule = pin, class:^(sticky-notes)$

# =============================================================================
# IMPORTANT: Window Rule Syntax
# Hyprland window rule syntax changes frequently between versions.
# Always check the official wiki for current syntax:
# https://github.com/hyprwm/hyprland-wiki/blob/main/content/Configuring/Window-Rules.md
# =============================================================================
